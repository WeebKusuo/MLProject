<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Exam Performance Indicator</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 0;
      color: #333;
    }
    .login {
      max-width: 600px;
      margin: 3rem auto;
      background: #fff;
      padding: 2rem 2.5rem;
      border-radius: 12px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
    }
    h1 {
      text-align: center;
      color: #444;
      margin: 0 0 1.2rem 0;
      font-size: 1.6rem;
    }
    legend {
      font-weight: 600;
      font-size: 1.3rem;
    }
    .mb-3 {
      margin-bottom: 1rem;
    }
    label.form-label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 500;
      color: #555;
    }
    select.form-control,
    input.form-control {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      box-sizing: border-box;
      background: #fdfdfd;
    }
    select.form-control:focus,
    input.form-control:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
    }
    .btn {
      display: block;
      width: 100%;
      padding: 0.7rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .btn-primary {
      background: #667eea;
      color: #fff;
    }
    .btn-primary:hover {
      background: #5a6fd8;
    }
    h2 {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f0f8ff;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      text-align: center;
      font-size: 1.2rem;
    }
    @media (max-width: 500px) {
      .login {
        margin: 1rem;
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login">
    <h1>Student Exam Performance Indicator</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">
      <legend>Student Exam Performance Prediction</legend>

      <div class="mb-3">
        <label class="form-label">Gender</label>
        <select class="form-control" name="gender" required>
          <option value="" disabled selected>Select your Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Race or Ethnicity</label>
        <select class="form-control" name="ethnicity" required>
          <option value="" disabled selected>Select Ethnicity</option>
          <option value="group A">Group A</option>
          <option value="group B">Group B</option>
          <option value="group C">Group C</option>
          <option value="group D">Group D</option>
          <option value="group E">Group E</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Parental Level of Education</label>
        <select class="form-control" name="parental_level_of_education" required>
          <option value="" disabled selected>Select Parent Education</option>
          <option value="associate's degree">Associate's degree</option>
          <option value="bachelor's degree">Bachelor's degree</option>
          <option value="high school">High school</option>
          <option value="master's degree">Master's degree</option>
          <option value="some college">Some college</option>
          <option value="some high school">Some high school</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Lunch Type</label>
        <select class="form-control" name="lunch" required>
          <option value="" disabled selected>Select Lunch Type</option>
          <option value="free/reduced">Free/Reduced</option>
          <option value="standard">Standard</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Test Preparation Course</label>
        <select class="form-control" name="test_preparation_course" required>
          <option value="" disabled selected>Select Test Course</option>
          <option value="none">None</option>
          <option value="completed">Completed</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Reading Score out of 100</label>
        <input
          class="form-control"
          type="number"
          name="reading_score"
          placeholder="Enter your Reading score"
          min="0"
          max="100"
          required
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Writing Score out of 100</label>
        <input
          class="form-control"
          type="number"
          name="writing_score"
          placeholder="Enter your Writing score"
          min="0"
          max="100"
          required
        />
      </div>

      <div class="mb-3">
        <button class="btn btn-primary" type="submit">
          Predict your Maths Score
        </button>
      </div>
    </form>

    {% if results is not none %}
      <h2>THE prediction is {{ results }}</h2>
    {% endif %}
  </div>
</body>
</html>
